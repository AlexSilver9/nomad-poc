# User to role mapping for create_user_tokens.sh
#
# Format:
#   username   nomad_roles (comma-separated)   consul_roles (comma-separated)
#
# Nomad roles:  nomad-deployer, nomad-readonly, nomad-node-operator
# Consul roles: consul-readonly, consul-readwrite
#
# Access levels:
#   admin    = nomad-deployer,nomad-node-operator + consul-readwrite
#   deployer = nomad-deployer                     + consul-readwrite
#   readonly = nomad-readonly                     + consul-readonly

alice        nomad-deployer,nomad-node-operator     consul-readwrite
bob          nomad-deployer,nomad-node-operator     consul-readwrite
